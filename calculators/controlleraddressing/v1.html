<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TCS 7-DIP Switch Calculator</title>
<style>
:root{
  --tcs-blue:#005ea8;
  --tcs-blue-2:#1d86e3;
  --tcs-dark:#133b63;
  --bg:#eaf3fb;
}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--tcs-dark)}
header{background:var(--tcs-blue);color:#fff;padding:18px;text-align:center;font-size:28px;font-weight:700}
.wrap{max-width:1050px;margin:24px auto;padding:24px;background:#fff;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,.15)}
.inputs{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:22px}
.card{flex:1;min-width:260px}
label{display:block;font-weight:700;margin-bottom:8px}
input,select{width:100%;font-size:34px;padding:12px;border:3px solid var(--tcs-blue);border-radius:10px;box-sizing:border-box;text-align:center;color:var(--tcs-dark);background:#fff}
.controls{display:flex;gap:14px;align-items:end;flex-wrap:wrap;margin:0 0 28px}
.control-card{min-width:180px}
button{font-size:24px;font-weight:700;padding:14px 24px;border:0;border-radius:10px;cursor:pointer;color:#fff;background:var(--tcs-blue);box-shadow:0 3px 8px rgba(0,0,0,.18)}
button:hover{background:#004c88}
button.secondary{background:#5d7285}
button.secondary:hover{background:#485b6b}
select{font-size:24px;padding:13px}
.switches{display:flex;justify-content:space-between;gap:12px}
.sw{text-align:center;flex:1}
.toggle{width:64px;height:140px;margin:auto;background:#d7d7d7;border-radius:34px;position:relative;border:3px solid #666;cursor:pointer}
.knob{position:absolute;left:6px;top:74px;width:46px;height:58px;background:#fff;border-radius:24px;transition:.2s;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.on .knob{top:6px;background:var(--tcs-blue-2)}
.state{font-weight:700;margin-top:8px}
.weight{font-size:20px;font-weight:700;margin-top:8px}
.dipnum{font-size:13px;margin-top:4px;color:#666}
.note{text-align:center;color:#666;margin-top:22px}
@media(max-width:700px){
  .switches{gap:6px}
  .toggle{width:44px;height:110px;border-radius:24px}
  .knob{left:4px;top:59px;width:30px;height:42px}
  .on .knob{top:5px}
  input{font-size:28px}
}
</style>
</head>
<body>
<header>TCS 7-DIP Switch Calculator</header>
<div class="wrap">
  <div class="inputs">
    <div class="card">
      <label for="dec">Decimal Value (0-127)</label>
      <input id="dec" type="number" min="0" max="127">
    </div>
    <div class="card">
      <label for="bin">Binary Value (7 bits, 64 → 1)</label>
      <input id="bin" type="text" maxlength="7">
    </div>
  </div>

  

  <div class="switches" id="switches"></div>
  
<div class="wrap" style="margin-top:18px;padding:20px;">
<div class="controls">
    <button id="playBtn">▶ Play</button>
    <button id="resetBtn" class="secondary">Reset</button>
    <div class="control-card">
      <label for="speed">Animation Speed</label>
      <select id="speed">
        <option value="1500">Slow - 1.5 sec</option>
        <option value="1000" selected>Normal - 1 sec</option>
        <option value="500">Fast - 0.5 sec</option>
        <option value="250">Very Fast - 0.25 sec</option>
      </select>
    </div>
  </div>
</div>
<div class="note">DIP order is left-to-right: 1, 2, 4, 8, 16, 32, 64. Press Play to demonstrate binary counting.</div>
</div>

<script>
const weights = [1,2,4,8,16,32,64];
const switchBank = document.getElementById('switches');
const dec = document.getElementById('dec');
const bin = document.getElementById('bin');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const speed = document.getElementById('speed');

let timer = null;

weights.forEach((weight, index) => {
  const sw = document.createElement('div');
  sw.className = 'sw';
  sw.innerHTML = `
    <div class="toggle" data-index="${index}"><div class="knob"></div></div>
    <div class="state">OFF</div>
    <div class="weight">${weight}</div>
    <div class="dipnum">DIP ${index + 1}</div>
  `;
  switchBank.appendChild(sw);
});

const toggles = [...document.querySelectorAll('.toggle')];

function decimalToSwitchBits(value){
  return weights.map(weight => (value & weight) ? '1' : '0');
}

function switchBitsToDecimal(bits){
  return bits.reduce((sum, bit, i) => sum + (bit === '1' ? weights[i] : 0), 0);
}

function displayBinaryFromDecimal(value){
  return value.toString(2).padStart(7,'0');
}

function currentDecimal(){
  return parseInt(dec.value, 10) || 0;
}

function setFromDecimal(value){
  value = Number.isFinite(value) ? Math.trunc(value) : 0;
  value = Math.max(0, Math.min(127, value));

  dec.value = value;
  bin.value = displayBinaryFromDecimal(value);

  const switchBits = decimalToSwitchBits(value);
  toggles.forEach((toggle, i) => {
    const on = switchBits[i] === '1';
    toggle.classList.toggle('on', on);
    toggle.parentElement.querySelector('.state').textContent = on ? 'ON' : 'OFF';
  });
}

function stopAnimation(){
  if(timer){
    clearInterval(timer);
    timer = null;
  }
  playBtn.textContent = '▶ Play';
}

function startAnimation(){
  stopAnimation();
  playBtn.textContent = '⏸ Pause';
  timer = setInterval(() => {
    let next = currentDecimal() + 1;
    if(next > 127) next = 0;
    setFromDecimal(next);
  }, parseInt(speed.value, 10));
}

playBtn.addEventListener('click', () => {
  if(timer) stopAnimation();
  else startAnimation();
});

resetBtn.addEventListener('click', () => {
  stopAnimation();
  setFromDecimal(0);
});

speed.addEventListener('change', () => {
  if(timer) startAnimation();
});

toggles.forEach((toggle, i) => {
  toggle.addEventListener('click', () => {
    stopAnimation();
    const bits = toggles.map(t => t.classList.contains('on') ? '1' : '0');
    bits[i] = bits[i] === '1' ? '0' : '1';
    setFromDecimal(switchBitsToDecimal(bits));
  });
});

dec.addEventListener('input', () => {
  stopAnimation();
  setFromDecimal(parseInt(dec.value, 10) || 0);
});

bin.addEventListener('input', () => {
  stopAnimation();
  const cleaned = bin.value.replace(/[^01]/g,'').slice(0,7);
  bin.value = cleaned;
  setFromDecimal(parseInt(cleaned || '0', 2));
});

setFromDecimal(0);
</script>
</body>
</html>
